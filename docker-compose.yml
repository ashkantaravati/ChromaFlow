services:
  chromaflow:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NUM_WORKERS: 4
      QUEUE_SIZE: 100
      PAGE_TIMEOUT: 30
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
