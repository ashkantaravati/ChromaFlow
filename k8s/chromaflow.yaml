apiVersion: v1
kind: ConfigMap
metadata:
  name: chromaflow-config
  namespace: chromaflow
data:
  PORT: "8080"
  NUM_WORKERS: "4"
  QUEUE_SIZE: "100"
  PAGE_TIMEOUT: "30"
  RESULT_TTL: "3600"
  QUEUE_BACKEND: "redis"
  STORAGE_BACKEND: "redis"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_KEY_PREFIX: "chromaflow"
  BLOB_BACKEND: "s3"
  S3_ENDPOINT: "minio:9000"
  S3_BUCKET: "chromaflow-pdfs"
  S3_REGION: "us-east-1"
  S3_USE_SSL: "false"
  S3_ACCESS_KEY_ID: "minioadmin"
  S3_SECRET_ACCESS_KEY: "minioadmin"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromaflow
  namespace: chromaflow
  labels:
    app.kubernetes.io/name: chromaflow
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chromaflow
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromaflow
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: chromaflow
          image: ghcr.io/OWNER/REPO:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: chromaflow-config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chromaflow
  namespace: chromaflow
  labels:
    app.kubernetes.io/name: chromaflow
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: chromaflow
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chromaflow
  namespace: chromaflow
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: chromaflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chromaflow
                port:
                  name: http
