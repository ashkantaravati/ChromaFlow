apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: chromaflow
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.chromaflow.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.chromaflow.svc.cluster.local:3100
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: ChromaFlow
        orgId: 1
        folder: ChromaFlow
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  chromaflow.json: |
    {"title":"ChromaFlow Overview","uid":"chromaflow-overview","schemaVersion":39,"refresh":"10s","panels":[]}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: chromaflow
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.2
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: provisioning
              mountPath: /var/lib/grafana/dashboards/chromaflow.json
              subPath: chromaflow.json
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: chromaflow
type: Opaque
stringData:
  password: admin
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: chromaflow
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: chromaflow
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.chromaflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  name: http
