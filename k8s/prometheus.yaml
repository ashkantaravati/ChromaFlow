apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: chromaflow
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/chromaflow-alerts.yml
    scrape_configs:
      - job_name: chromaflow
        metrics_path: /metrics
        static_configs:
          - targets: ['chromaflow.chromaflow.svc.cluster.local:8080']
  chromaflow-alerts.yml: |
    groups:
      - name: chromaflow.rules
        rules:
          - alert: ChromaFlowHighQueueDepth
            expr: chromaflow_queue_capacity > 0 and chromaflow_queue_depth / chromaflow_queue_capacity > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: ChromaFlow queue depth is above 80% capacity
          - alert: ChromaFlowHighRenderErrorRate
            expr: sum(rate(chromaflow_jobs_finished_total{status="failed"}[5m])) / clamp_min(sum(rate(chromaflow_jobs_finished_total[5m])), 0.001) > 0.1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: ChromaFlow render error rate is high
          - alert: ChromaFlowHighP95RenderLatency
            expr: histogram_quantile(0.95, sum by (le) (rate(chromaflow_pdf_render_duration_seconds_bucket[10m]))) > 30
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: ChromaFlow p95 render latency is high
          - alert: ChromaFlowWorkerStarvation
            expr: chromaflow_queue_depth > 0 and chromaflow_active_workers == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: ChromaFlow has queued jobs but no active workers
          - alert: ChromaFlowStorageBytesGrowingFast
            expr: increase(chromaflow_storage_pdf_bytes[30m]) > 1073741824
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: ChromaFlow PDF storage bytes are growing quickly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: chromaflow
  labels:
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: chromaflow
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
